<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Doctors</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* =========================
GLOBAL
========================= */

body{
    background: radial-gradient(circle at top, #0f172a, #020617);
    color:white;
    font-family:Arial;
    padding:25px;
}

/* =========================
CARD
========================= */

.card{
    background: rgba(30, 41, 59, 0.85);
    backdrop-filter: blur(10px);
    padding:22px;
    border-radius:18px;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* =========================
INPUTS
========================= */

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-bottom:10px;
    background:#0f172a;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.3s;
}

input:focus{
    border-color:#06b6d4;
    box-shadow:0 0 0 2px rgba(6,182,212,0.2);
}

/* =========================
BUTTONS
========================= */

button{
    border:none;
    cursor:pointer;
    transition:0.3s;
}

.primary-btn{
    background:linear-gradient(135deg,#06b6d4,#3b82f6);
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:600;
    width:100%;
}

.primary-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(6,182,212,0.25);
}

/* =========================
TITLE
========================= */

h2{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
    color:#38bdf8;
}

/* =========================
DOCTOR CARD
========================= */

.doctor-card{
    background: linear-gradient(135deg,#1e293b,#0f172a);
    padding:16px;
    border-radius:16px;
    margin-bottom:12px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border:1px solid rgba(255,255,255,0.05);
    transition:0.3s;
}

.doctor-card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.doctor-name{
    font-size:18px;
    font-weight:700;
    color:#80ffdb;
}

.doctor-special{
    font-size:13px;
    color:#94a3b8;
    margin-top:3px;
}

/* =========================
ACTIONS
========================= */

.actions{
    display:flex;
    gap:8px;
}

.open-btn{
    background:linear-gradient(135deg,#10b981,#22c55e);
    color:white;
    padding:10px 14px;
    border-radius:10px;
    font-weight:600;
}

.open-btn:hover{
    transform:scale(1.05);
}

.delete-btn{
    background:linear-gradient(135deg,#ef4444,#dc2626);
    color:white;
    padding:10px 14px;
    border-radius:10px;
    font-weight:600;
}

.delete-btn:hover{
    transform:scale(1.05);
}

/* =========================
EMPTY STATE
========================= */

.empty{
    text-align:center;
    color:#64748b;
    padding:20px;
}

</style>
</head>

<body>

<!-- =========================
ADD DOCTOR
========================= -->

<div class="card">

<h2>
<i class="fa-solid fa-user-doctor"></i>
Add Doctor
</h2>

<input id="doctorName" placeholder="Doctor Name">

<input id="doctorSpecialization" placeholder="Specialization">

<input id="doctorAge" type="number" placeholder="Age">

<input id="doctorPhone" placeholder="Phone">

<input id="doctorAddress" placeholder="Address">

<button class="primary-btn" onclick="saveDoctor()">
Save Doctor
</button>


</div>

<div class="card">
    <button onclick="goToDashboard()" class="primary-btn"
style="
    background:linear-gradient(135deg,#00b09b,#96c93d);
    padding:12px 16px;
    font-weight:600;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,176,155,0.25);
">
    ← Dashboard
</button>
</div>



<!-- =========================
LIST
========================= -->

<div class="card">

<h2>
<i class="fa-solid fa-users"></i>
Doctors List
</h2>

<div id="doctorsContainer"></div>

</div>

<!-- =========================
SCRIPTS
========================= -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/doctors.js"></script>

</body>
</html>
